<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SEJUROloop</title>
<style>

body{
    margin:0;
    font-family:Arial;
    color:#fff;
    background:url('https://images.unsplash.com/photo-1605902711622-cfb43c44367f') center/cover no-repeat fixed;
}
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(10,5,30,0.85);
    top:0;
    left:0;
    z-index:-1;
}

header{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

.logo{
    font-size:22px;
    font-weight:bold;
    background:linear-gradient(90deg,#00f5d4,#ff2bd6);
    -webkit-background-clip:text;
    color:transparent;
}

.promo{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:linear-gradient(90deg,#ff2bd6,#4cc9f0);
    color:#fff;
    cursor:pointer;
}

.hero{
    text-align:center;
    margin-top:40px;
}

.hero h1{
    font-size:60px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:60px;
}

.card{
    width:300px;
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(15px);
    opacity:0;
    transform:translateY(40px);
    animation:fadeUp 1s forwards;
}

.card:nth-child(2){animation-delay:0.2s;}
.card:nth-child(3){animation-delay:0.4s;}

@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.price{
    color:#ff2bd6;
    font-size:26px;
}

.buy{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    background:linear-gradient(90deg,#ff2bd6,#ff6ec7);
    color:#fff;
    cursor:pointer;
}

</style>
</head>
<body>

<header>
<div class="logo">SEJUROloop</div>
<button class="promo" onclick="promo()">Ввести промокод</button>
</header>

<div class="hero">
<h1>SEJUROLOOP</h1>
<p>Мощные читы • Быстрая доставка • Ежедневные обновления</p>
</div>

<div class="cards">

<div class="card">
<h3>PATRIKdlc</h3>
<p>Minecraft Java + Bedrock</p>
<div class="price">359 ₽</div>
<button class="buy" id="btn1" onclick="goBuy()">КУПИТЬ</button>
</div>

<div class="card">
<h3>AIMfool</h3>
<p>Fortnite Chapter 6</p>
<div class="price">359 ₽</div>
<button class="buy" id="btn2" onclick="goBuy()">КУПИТЬ</button>
</div>

<div class="card">
<h3>NeverFool</h3>
<p>Counter-Strike 2</p>
<div class="price">359 ₽</div>
<button class="buy" id="btn3" onclick="goBuy()">КУПИТЬ</button>
</div>

</div>

<script>

function promo(){
    let code=prompt("Введите промокод");
    if(code==="threemods"){
        localStorage.setItem("promo","true");
        applyPromo();
        alert("Промокод активирован!");
    } else {
        alert("Неверный код");
    }
}

function applyPromo(){
    if(localStorage.getItem("promo")==="true"){
        let links=[
            "https://github.com/yourfile1",
            "https://github.com/yourfile2",
            "https://github.com/yourfile3"
        ];

        [btn1,btn2,btn3].forEach((btn,i)=>{
            btn.textContent="7 ДНЕЙ БЕСПЛАТНО";
            btn.onclick=()=>window.location.href=links[i];
        });
    }
}

function goBuy(){
    window.location.href="buy.html";
}

// при загрузке
applyPromo();

</script>

</body>
</html>
