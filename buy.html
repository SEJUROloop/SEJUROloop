<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Покупка</title>
<style>

body{
    margin:0;
    font-family:Arial;
    color:#fff;
    background:url('https://images.unsplash.com/photo-1605902711622-cfb43c44367f') center/cover no-repeat fixed;
}
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(10,5,30,0.9);
    top:0;
    left:0;
    z-index:-1;
}

header{
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
}

.logo{
    background:linear-gradient(90deg,#00f5d4,#ff2bd6);
    -webkit-background-clip:text;
    color:transparent;
    font-weight:bold;
}

.back{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#2a2545;
    color:#fff;
    cursor:pointer;
}

.box{
    max-width:600px;
    margin:80px auto;
    padding:30px;
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    backdrop-filter:blur(15px);
}

.price{
    font-size:40px;
    color:#ff2bd6;
}

.buttons{
    margin-top:20px;
}

button{
    padding:15px 20px;
    border:none;
    border-radius:12px;
    margin:10px;
    cursor:pointer;
    font-weight:bold;
}

.sbp{
    background:#00e676;
    color:#000;
}

.card{
    background:linear-gradient(90deg,#ff2bd6,#ff6ec7);
    color:#fff;
}

#result img{
    margin-top:20px;
}

</style>
</head>
<body>

<header>
<div class="logo">SEJUROloop</div>
<button class="back" onclick="location.href='index.html'">← На главную</button>
</header>

<div class="box">
<h3 id="title"></h3>
<p>Самый мощный и стабильный продукт с регулярными обновлениями.</p>

<div class="price">359 ₽</div>

<h3>Выберите способ оплаты:</h3>

<div class="buttons">
<button class="sbp" onclick="sbp()">Оплатить по СБП (QR)</button>
<button class="card" onclick="card()">Оплатить картой</button>
</div>

<div id="result"></div>

</div>

<script>
let names={
    patrik:"Minecraft • PATRIKdlc",
    aim:"Fortnite • AIMfool",
    never:"CS2 • NeverFool"
};

let params=new URLSearchParams(location.search);
let p=params.get("product");

document.getElementById("title").innerText=names[p];

function sbp(){
    let rand=Math.random();
    document.getElementById("result").innerHTML=
    '<img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://youtu.be/dQw4w9WgXcQ?'+rand+'">';
}

function card(){
    document.getElementById("result").innerHTML="Временно недоступно!";
}
</script>

</body>
</html>
